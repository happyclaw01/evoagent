# conf/llm/openrouter.yaml - OpenRouter configuration (multi-model gateway)
provider: "openai"
model_name: "anthropic/claude-sonnet-4"
async_client: true
temperature: 1
top_p: 1.0
min_p: 0.0
top_k: -1
max_tokens: 4096
max_context_length: 200000
api_key: "${oc.env:OPENAI_API_KEY}"
base_url: "https://openrouter.ai/api/v1"
keep_tool_result: -1
repetition_penalty: 1.0
